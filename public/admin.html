<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Pal — Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1D9E75;
      --green-light: #E6F7F1;
      --green-mid:   #A8DEC9;
      --green-dark:  #0A4D36;
      --ink:         #1A1A1A;
      --ink-2:       #6B6B65;
      --ink-3:       #B0B0A8;
      --surface:     #FFFFFF;
      --surface-2:   #F7F8F6;
      --surface-3:   #EFF1EE;
      --line:        rgba(0,0,0,0.08);
      --line-md:     rgba(0,0,0,0.13);
      --red-bg:      #FFF0F0;
      --red-border:  #FECACA;
      --red-text:    #7F1D1D;
      --sans:        'Nunito', sans-serif;
      --mono:        'DM Mono', monospace;
    }

    body {
      font-family: var(--sans);
      background: var(--surface-2);
      min-height: 100vh;
      padding: 28px 20px 48px;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .page { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border: 1px solid var(--line-md);
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .brand-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    .brand-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-2);
      margin-top: 2px;
    }
    .logout-btn {
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-2);
      background: var(--surface-2);
      border: 1px solid var(--line-md);
      border-radius: 20px;
      padding: 6px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .logout-btn:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Error banner ── */
    .error-banner {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red-text);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13.5px;
      display: none;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 7px;
      letter-spacing: -0.5px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Table card ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--line-md);
      border-radius: 14px;
      overflow: hidden;
    }
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
      gap: 10px;
    }
    .table-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--ink);
    }
    .toolbar-right { display: flex; gap: 8px; align-items: center; }
    .toolbar-btn {
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 600;
      border: 1px solid var(--line-md);
      background: var(--surface-2);
      color: var(--ink-2);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .toolbar-btn:hover {
      border-color: var(--green);
      color: var(--green-dark);
      background: var(--green-light);
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      background: var(--surface-2);
      padding: 10px 16px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-2);
      white-space: nowrap;
      border-bottom: 1px solid var(--line);
    }
    tbody tr { border-top: 1px solid var(--line); }
    tbody tr:hover { background: var(--surface-2); }
    td { padding: 11px 16px; vertical-align: top; }

    .stars { color: var(--green); font-size: 13px; letter-spacing: 1px; }
    .stars-empty { color: var(--ink-3); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
    }
    .badge-yes  { background: var(--green-light); color: var(--green-dark); }
    .badge-no   { background: var(--red-bg); color: var(--red-text); }
    .badge-null { background: var(--surface-3); color: var(--ink-3); }

    .ts-date { font-size: 13px; color: var(--ink); font-weight: 500; }
    .ts-time { font-family: var(--mono); font-size: 11px; color: var(--ink-2); margin-top: 2px; }

    .comment-cell {
      max-width: 240px;
      font-size: 12.5px;
      color: var(--ink-2);
      font-style: italic;
    }
    .num-cell { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

    /* ── States ── */
    .state-row td {
      text-align: center;
      padding: 52px 16px;
      color: var(--ink-3);
      font-size: 13.5px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2.5px solid var(--line-md);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-2);
      flex-wrap: wrap;
      gap: 8px;
    }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 600;
      padding: 5px 14px;
      border: 1px solid var(--line-md);
      background: var(--surface);
      color: var(--ink-2);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-btn:not(:disabled):hover {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green-dark);
    }

    @media (max-width: 600px) {
      body { padding: 14px 10px 40px; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-avatar">U</div>
      <div>
        <div class="brand-name">U-Pal Admin</div>
        <div class="brand-sub">UWTSD · Student feedback dashboard</div>
      </div>
    </div>
    <a class="logout-btn" href="/api/logout" onclick="handleLogout(event)">Sign out</a>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total responses</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvgRating">—</div>
      <div class="stat-label">Avg rating</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statHelpful">—</div>
      <div class="stat-label">Found helpful</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statCorrectLang">—</div>
      <div class="stat-label">Correct language</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statWithComments">—</div>
      <div class="stat-label">Left comments</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-toolbar">
      <span class="table-title">All feedback entries</span>
      <div class="toolbar-right">
        <button class="toolbar-btn" onclick="exportCSV()">Export CSV</button>
        <button class="toolbar-btn" onclick="loadFeedback()">Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date &amp; time</th>
            <th>Rating</th>
            <th>Helpful?</th>
            <th>Correct language?</th>
            <th>Comments</th>
          </tr>
        </thead>
        <tbody id="feedbackBody">
          <tr class="state-row">
            <td colspan="6">
              <div class="spinner"></div>
              Loading feedback...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <span id="pageInfo">—</span>
      <div class="page-btns">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>Prev</button>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)"  disabled>Next</button>
      </div>
    </div>
  </div>

</div>

<script>
  const PAGE_SIZE = 20;
  let allData     = [];
  let currentPage = 1;

  async function loadFeedback() {
    setLoading();
    try {
      const res = await fetch('/api/feedback');
      if (res.status === 401) { window.location.reload(); return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allData = await res.json();
      renderStats(allData);
      renderPage(1);
      hideError();
    } catch (err) {
      showError('Failed to load feedback: ' + err.message);
    }
  }

  function renderStats(data) {
    const total = data.length;
    document.getElementById('statTotal').textContent = total;
    if (total === 0) {
      ['statAvgRating','statHelpful','statCorrectLang','statWithComments']
        .forEach(id => document.getElementById(id).textContent = '—');
      return;
    }
    const avg = (data.reduce((s, d) => s + d.satisfaction, 0) / total).toFixed(1);
    document.getElementById('statAvgRating').textContent = avg + ' ★';
    const helpful = data.filter(d => d.helpfulAnswer === true).length;
    document.getElementById('statHelpful').textContent = Math.round((helpful / total) * 100) + '%';
    const correctLang = data.filter(d => d.correctLanguage === true).length;
    document.getElementById('statCorrectLang').textContent = Math.round((correctLang / total) * 100) + '%';
    const withComments = data.filter(d => d.comments && d.comments.trim()).length;
    document.getElementById('statWithComments').textContent = withComments;
  }

  function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * PAGE_SIZE;
    const slice = allData.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById('feedbackBody');
    const totalPages = Math.ceil(allData.length / PAGE_SIZE);

    if (allData.length === 0) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="6">No feedback submitted yet.</td></tr>';
      document.getElementById('pageInfo').textContent = '0 entries';
      document.getElementById('prevBtn').disabled = true;
      document.getElementById('nextBtn').disabled = true;
      return;
    }

    tbody.innerHTML = slice.map((entry, i) => {
      const num     = start + i + 1;
      const date    = new Date(entry.timestamp);
      const dateStr = date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const filled  = '★'.repeat(entry.satisfaction);
      const empty   = '★'.repeat(5 - entry.satisfaction);
      const helpful = badgeHtml(entry.helpfulAnswer);
      const lang    = badgeHtml(entry.correctLanguage);
      const comment = entry.comments
        ? '<span title="' + escHtml(entry.comments) + '">' + escHtml(entry.comments.slice(0,80)) + (entry.comments.length > 80 ? '…' : '') + '</span>'
        : '<span style="color:var(--ink-3)">—</span>';

      return '<tr>' +
        '<td class="num-cell">' + num + '</td>' +
        '<td><div class="ts-date">' + dateStr + '</div><div class="ts-time">' + timeStr + '</div></td>' +
        '<td><span class="stars">' + filled + '</span><span class="stars-empty">' + empty + '</span></td>' +
        '<td>' + helpful + '</td>' +
        '<td>' + lang + '</td>' +
        '<td class="comment-cell">' + comment + '</td>' +
        '</tr>';
    }).join('');

    document.getElementById('pageInfo').textContent =
      'Showing ' + (start + 1) + '–' + Math.min(start + PAGE_SIZE, allData.length) + ' of ' + allData.length;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= totalPages;
  }

  function changePage(dir) { renderPage(currentPage + dir); }

  function badgeHtml(val) {
    if (val === true)  return '<span class="badge badge-yes">Yes</span>';
    if (val === false) return '<span class="badge badge-no">No</span>';
    return '<span class="badge badge-null">—</span>';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setLoading() {
    document.getElementById('feedbackBody').innerHTML =
      '<tr class="state-row"><td colspan="6"><div class="spinner"></div>Loading...</td></tr>';
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  function exportCSV() {
    if (!allData.length) return alert('No data to export.');
    const headers = ['#','Timestamp','Rating','Helpful','Correct Language','Comments'];
    const rows = allData.map((d, i) => [
      i + 1,
      d.timestamp,
      d.satisfaction,
      d.helpfulAnswer === true ? 'Yes' : d.helpfulAnswer === false ? 'No' : '',
      d.correctLanguage === true ? 'Yes' : d.correctLanguage === false ? 'No' : '',
      '"' + (d.comments || '').replace(/"/g,'""') + '"'
    ]);
    const csv  = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'upal-feedback-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleLogout(e) {
    e.preventDefault();
    fetch('/api/logout').finally(() => { window.location.href = '/'; });
  }

  loadFeedback();
</script>
</body>
</html>

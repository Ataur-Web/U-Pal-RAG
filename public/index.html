<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Pal — UWTSD Student Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       U-Pal · warm hospitality
       A soft, helpful bilingual student assistant for UWTSD.
       ============================================================ */

    :root {
      color-scheme: light dark;

      /* Neutrals — warm paper tinted toward UWTSD green */
      --paper:       oklch(97.5% 0.008 162);
      --surface:     oklch(99.2% 0.004 162);
      --surface-2:   oklch(95% 0.010 162);
      --surface-3:   oklch(91% 0.014 162);
      --ink:         oklch(22% 0.015 162);
      --ink-2:       oklch(42% 0.012 162);
      --ink-3:       oklch(60% 0.010 162);
      --line:        oklch(22% 0.015 162 / 0.09);
      --line-md:     oklch(22% 0.015 162 / 0.18);

      /* Brand — UWTSD green (≈ #1D9E75) */
      --green:       oklch(62% 0.12 162);
      --green-deep:  oklch(44% 0.10 162);
      --green-soft:  oklch(94% 0.035 162);
      --green-mid:   oklch(78% 0.09 162);

      /* Welsh red — rare, saved for the language-switch moment */
      --welsh:       oklch(52% 0.14 25);
      --welsh-soft:  oklch(95% 0.025 25);

      /* Shape */
      --radius-sm:   10px;
      --radius:      14px;
      --radius-lg:   22px;

      /* Spacing — 4pt scale */
      --space-xs:    4px;
      --space-sm:    8px;
      --space-md:    12px;
      --space-lg:    16px;
      --space-xl:    24px;
      --space-2xl:   32px;

      /* Type */
      --sans:  'Nunito', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono:  'DM Mono', ui-monospace, Menlo, monospace;

      /* Motion — Emil Kowalski curves */
      --ease-out:    cubic-bezier(0.23, 1,    0.32, 1);  /* strong: enters fast, feels snappy */
      --ease-in-out: cubic-bezier(0.77, 0,    0.175, 1); /* on-screen movement */
      --ease:        cubic-bezier(0.33, 1,    0.68, 1);  /* hover/colour changes */
      --ease-in:     cubic-bezier(0.55, 0,    1,    0.45); /* exits only */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --paper:       oklch(18% 0.012 162);
        --surface:     oklch(22% 0.014 162);
        --surface-2:   oklch(26% 0.014 162);
        --surface-3:   oklch(31% 0.014 162);
        --ink:         oklch(95% 0.008 162);
        --ink-2:       oklch(78% 0.010 162);
        --ink-3:       oklch(58% 0.010 162);
        --line:        oklch(95% 0.008 162 / 0.09);
        --line-md:     oklch(95% 0.008 162 / 0.18);
        --green:       oklch(72% 0.12 162);
        --green-deep:  oklch(84% 0.10 162);
        --green-soft:  oklch(28% 0.045 162);
        --green-mid:   oklch(50% 0.09 162);
        --welsh:       oklch(72% 0.13 25);
        --welsh-soft:  oklch(28% 0.04 25);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    a {
      color: var(--green-deep);
      text-decoration: none;
      border-bottom: 1px solid color-mix(in oklab, var(--green-deep) 32%, transparent);
      transition: border-color 160ms var(--ease-out), color 160ms var(--ease-out);
    }
    a:hover { border-bottom-color: currentColor; }

    button { font-family: inherit; cursor: pointer; }
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* ── Shell ── */
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      position: relative;
    }
    @media (max-width: 760px) {
      .shell { border-left: none; border-right: none; }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-lg);
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklab, var(--surface) 92%, transparent);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: saturate(140%) blur(8px);
      -webkit-backdrop-filter: saturate(140%) blur(8px);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      min-width: 0;
    }

    .brand-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--green-soft);
      color: var(--green-deep);
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.02em;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1px solid color-mix(in oklab, var(--green) 28%, transparent);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.15;
      min-width: 0;
    }

    .brand-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
    }

    .brand-sub {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      letter-spacing: 0.005em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .online-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      opacity: 0.9;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      flex-shrink: 0;
    }

    .feedback-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--line-md);
      padding: 7px 14px;
      border-radius: 999px;
      transition: background 160ms var(--ease), border-color 160ms var(--ease), transform 100ms var(--ease-out);
    }
    @media (hover: hover) and (pointer: fine) {
      .feedback-btn:hover { background: var(--surface-2); border-color: var(--ink-3); }
    }
    .feedback-btn:active { transform: scale(0.96); background: var(--surface-3); transition-duration: 80ms; }

    .lang-indicator {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--ink-3);
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--surface-2);
      white-space: nowrap;
      user-select: none;
    }
    .lang-indicator .lit { color: var(--ink); font-weight: 700; }
    .lang-indicator .dim { color: var(--ink-3); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      padding: var(--space-2xl) var(--space-xl) var(--space-lg);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 10px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--line-md);
      border-radius: 999px;
      border: 3px solid var(--surface);
    }

    .row {
      display: flex;
      gap: var(--space-md);
      align-items: flex-end;
      animation: msgEnter 260ms var(--ease-out) both;
    }
    .row.user { justify-content: flex-end; }
    .row.bot  { justify-content: flex-start; }

    @keyframes msgEnter {
      0%   { opacity: 0; transform: translateY(8px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--green-soft);
      color: var(--green-deep);
      font-size: 12.5px;
      font-weight: 800;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-bottom: var(--space-xs);
      border: 1px solid color-mix(in oklab, var(--green) 22%, transparent);
    }

    .bot-col {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      max-width: min(68ch, calc(100% - 44px));
    }

    .bubble {
      max-width: 100%;
      padding: 13px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 15.5px;
      font-weight: 400;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .bubble.user {
      background: var(--green);
      color: oklch(99% 0.008 162);
      border-bottom-right-radius: 5px;
      max-width: min(60ch, 80%);
      font-weight: 500;
    }
    .bubble.bot {
      background: var(--surface-2);
      color: var(--ink);
      border-bottom-left-radius: 5px;
    }
    .bubble.bot a {
      color: var(--green-deep);
      font-weight: 600;
      border-bottom: 1px solid color-mix(in oklab, var(--green-deep) 38%, transparent);
    }

    .cy-chip {
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--welsh);
      padding: 0 0 0 2px;
    }

    .translate-btn {
      align-self: flex-start;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
      background: transparent;
      border: 1px solid var(--line-md);
      padding: 5px 12px;
      border-radius: 999px;
      transition: color 160ms var(--ease), border-color 160ms var(--ease), background 160ms var(--ease), transform 100ms var(--ease-out);
    }
    @media (hover: hover) and (pointer: fine) {
      .translate-btn:hover { color: var(--green-deep); border-color: var(--green); background: var(--green-soft); }
    }
    .translate-btn:active { transform: scale(0.96); transition-duration: 80ms; }

    .typing-bubble {
      background: var(--surface-2);
      padding: 14px 18px;
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
      animation: msgEnter 260ms var(--ease-out) both;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.45;
      animation: typingPop 1.1s infinite var(--ease-in-out);
    }
    .typing-bubble span:nth-child(1) { animation-delay: 0s; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.16s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes typingPop {
      0%, 55%, 100% { transform: translateY(0); opacity: 0.35; }
      28%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-xl) var(--space-md);
    }
    .chip {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line-md);
      padding: 8px 14px;
      border-radius: 999px;
      transition: background 160ms var(--ease), border-color 160ms var(--ease), color 160ms var(--ease), transform 100ms var(--ease-out);
      animation: chipPop 200ms var(--ease-out) both;
    }
    .chip:nth-child(1) { animation-delay: 0ms; }
    .chip:nth-child(2) { animation-delay: 35ms; }
    .chip:nth-child(3) { animation-delay: 70ms; }
    .chip:nth-child(4) { animation-delay: 105ms; }
    .chip:nth-child(5) { animation-delay: 140ms; }
    .chip:nth-child(6) { animation-delay: 175ms; }
    .chip:nth-child(7) { animation-delay: 210ms; }
    .chip:nth-child(8) { animation-delay: 245ms; }
    @keyframes chipPop {
      0%   { opacity: 0; transform: translateY(5px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (hover: hover) and (pointer: fine) {
      .chip:hover {
        color: var(--green-deep);
        border-color: var(--green);
        background: var(--green-soft);
      }
    }
    .chip:active { transform: scale(0.96); transition-duration: 80ms; }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--line);
      background: var(--surface);
      padding: var(--space-md) var(--space-xl) var(--space-lg);
      position: sticky;
      bottom: 0;
    }
    .input-row {
      display: flex;
      gap: var(--space-sm);
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      padding: 13px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line-md);
      background: var(--paper);
      font-family: var(--sans);
      font-size: 15.5px;
      line-height: 1.5;
      color: var(--ink);
      transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .chat-input::placeholder { color: var(--ink-3); }
    .chat-input:focus {
      border-color: var(--green);
      outline: none;
      background: var(--surface);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      padding: 0;
      background: var(--green);
      color: var(--surface);
      border: none;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background 160ms var(--ease), transform 100ms var(--ease-out);
    }
    .send-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
    }
    @media (hover: hover) and (pointer: fine) {
      .send-btn:hover:not(:disabled) { background: var(--green-deep); }
    }
    .send-btn:active:not(:disabled) { transform: scale(0.94); transition-duration: 80ms; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .sub-footer {
      font-size: 11.5px;
      color: var(--ink-3);
      text-align: center;
      padding: var(--space-sm) var(--space-xl) 0;
      line-height: 1.5;
    }

    .forms-link {
      display: block;
      text-align: center;
      padding: var(--space-md) var(--space-xl) var(--space-lg);
      font-size: 12.5px;
      color: var(--ink-3);
      border-bottom: none;
    }
    .forms-link:hover { color: var(--green-deep); border-bottom-color: transparent; }

    /* ── Feedback modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: color-mix(in oklab, var(--ink) 55%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: grid;
      place-items: center;
      z-index: 100;
      padding: var(--space-lg);
      transition: opacity 200ms var(--ease-out);
    }
    .overlay-enter { animation: overlayIn 200ms var(--ease-out) both; }
    .overlay-leave { animation: overlayOut 150ms var(--ease-in) both; }
    @keyframes overlayIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayOut { from { opacity: 1; } to { opacity: 0; } }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 440px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--line);
      animation: modalIn 280ms var(--ease-out) both;
    }
    @keyframes modalIn {
      0%   { opacity: 0; transform: translateY(12px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-head {
      padding: var(--space-xl) var(--space-xl) var(--space-md);
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
      margin-bottom: var(--space-xs);
    }
    .modal-sub {
      font-size: 13.5px;
      color: var(--ink-2);
      line-height: 1.55;
      max-width: 48ch;
    }
    .modal-close {
      position: absolute;
      top: var(--space-lg);
      right: var(--space-lg);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--ink-2);
      font-size: 16px;
      display: grid;
      place-items: center;
      transition: background 160ms var(--ease-out), color 160ms var(--ease-out);
    }
    @media (hover: hover) and (pointer: fine) {
      .modal-close:hover { background: var(--surface-3); color: var(--ink); }
    }
    .modal-close:active { transform: scale(0.88); transition: transform 80ms var(--ease-out); }

    .fb-section {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--line);
    }
    .fb-section:last-of-type { border-bottom: none; }

    .fb-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: var(--space-sm);
      display: block;
      letter-spacing: 0.01em;
    }

    .star-row { display: flex; gap: 4px; }
    .star {
      width: 38px; height: 38px;
      border: none;
      background: transparent;
      font-size: 26px;
      color: var(--ink-3);
      cursor: pointer;
      transition: color 140ms var(--ease-out), transform 140ms var(--ease-out);
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
    }
    @media (hover: hover) and (pointer: fine) {
      .star:hover { transform: scale(1.2); color: var(--green); }
    }
    .star.on { color: var(--green); }

    .toggle-row { display: flex; gap: var(--space-sm); }
    .toggle-btn {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid var(--line-md);
      background: var(--surface);
      border-radius: var(--radius-sm);
      color: var(--ink-2);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      transition: background 160ms var(--ease-out), border-color 160ms var(--ease-out), color 160ms var(--ease-out);
    }
    @media (hover: hover) and (pointer: fine) {
      .toggle-btn:hover { border-color: var(--green); color: var(--green-deep); }
    }
    .toggle-btn:active { transform: scale(0.97); transition-duration: 80ms; }
    .toggle-btn.on {
      background: var(--green-soft);
      color: var(--green-deep);
      border-color: var(--green);
      font-weight: 600;
    }

    .fb-textarea {
      width: 100%;
      resize: vertical;
      min-height: 80px;
      padding: 11px 14px;
      border: 1px solid var(--line-md);
      border-radius: var(--radius-sm);
      background: var(--paper);
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink);
      line-height: 1.5;
      transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out);
    }
    .fb-textarea:focus {
      border-color: var(--green);
      outline: none;
      background: var(--surface);
    }

    .fb-submit {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 700;
      transition: background 160ms var(--ease-out), transform 120ms var(--ease-out);
    }
    @media (hover: hover) and (pointer: fine) {
      .fb-submit:hover:not(:disabled) { background: var(--green-deep); }
    }
    .fb-submit:active:not(:disabled) { transform: scale(0.98); transition-duration: 80ms; }
    .fb-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .fb-thanks {
      text-align: center;
      padding: var(--space-2xl) var(--space-xl);
      font-size: 16px;
      font-weight: 600;
      color: var(--green-deep);
      line-height: 1.5;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.3s var(--ease-out); }

    /* ── Language notice ── */
    .lang-notice {
      align-self: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--welsh);
      background: var(--welsh-soft);
      padding: 6px 12px;
      border-radius: 999px;
      margin: var(--space-sm) auto;
      animation: msgEnter 260ms var(--ease-out) both;
    }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
      pointer-events: none;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      background: var(--surface);
      padding: 9px 15px;
      border-radius: 999px;
      border: 1px solid var(--line-md);
      white-space: nowrap;
      pointer-events: auto;
      /* CSS transitions — interruptible unlike keyframes (Emil: use transitions for rapidly-triggered UI) */
      opacity: 1;
      transform: translateY(0) scale(1);
      transition: opacity 300ms var(--ease-out), transform 300ms var(--ease-out);
    }
    /* Asymmetric exit: fast out, matches Emil's "exit faster than enter" principle */
    .toast.exit {
      opacity: 0;
      transform: translateY(-8px) scale(0.95);
      transition: opacity 180ms var(--ease-in), transform 180ms var(--ease-in);
    }
    /* @starting-style triggers the entry transition from hidden → visible */
    @starting-style {
      .toast {
        opacity: 0;
        transform: translateY(-12px) scale(0.95);
      }
    }
    .toast-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    [x-cloak] { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="shell" x-data="upal()">

  <!-- ── Header ── -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-avatar">U</div>
      <div class="brand-text">
        <span class="brand-name">U-Pal</span>
        <span class="brand-sub">
          <span class="online-dot"></span>
          <span x-text="lang === 'cy' ? 'Cynorthwyydd Myfyrwyr PCYDDS' : 'UWTSD Student Assistant'"></span>
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button class="feedback-btn" @click="openFeedback()" x-text="lang === 'cy' ? 'Adborth' : 'Rate U-Pal'"></button>
      <div class="lang-indicator" :title="lang === 'cy' ? 'Cymraeg detected' : 'English detected'">
        <span :class="lang === 'cy' ? 'lit' : 'dim'">CY</span>
        <span style="color:var(--ink-3)"> · </span>
        <span :class="lang === 'en' ? 'lit' : 'dim'">EN</span>
      </div>
    </div>
  </div>

  <!-- ── Messages ── -->
  <div class="messages" id="msgList" role="log" aria-live="polite">

    <template x-for="(m, i) in msgs" :key="i">
      <div>

        <!-- lang notice -->
        <template x-if="m.type === 'notice'">
          <div class="lang-notice" x-text="m.text"></div>
        </template>

        <!-- user message -->
        <template x-if="m.type === 'user'">
          <div class="row user">
            <div class="bubble user" x-text="m.text"></div>
          </div>
        </template>

        <!-- bot message -->
        <template x-if="m.type === 'bot'">
          <div class="row bot">
            <div class="msg-avatar">U</div>
            <div class="bot-col">
              <template x-if="m.msgLang === 'cy'">
                <span class="cy-chip">Cymraeg</span>
              </template>
              <div class="bubble bot" x-html="m._showAlt ? m.altHtml : m.html"></div>
              <template x-if="m.altHtml">
                <button
                  class="translate-btn"
                  @click="m._showAlt = !m._showAlt"
                  x-text="m._showAlt
                    ? (m.msgLang === 'cy' ? 'Nôl i Gymraeg' : 'Back to English')
                    : (m.msgLang === 'cy' ? 'Cyfieithwch i Saesneg' : 'Translate to Welsh')"
                ></button>
              </template>
            </div>
          </div>
        </template>

        <!-- typing -->
        <template x-if="m.type === 'typing'">
          <div class="row bot">
            <div class="msg-avatar">U</div>
            <div class="typing-bubble">
              <span></span><span></span><span></span>
            </div>
          </div>
        </template>

      </div>
    </template>

    <!-- Quick chips -->
    <template x-if="!chipsDismissed">
      <div class="chips">
        <template x-for="chip in chips" :key="chip.en">
          <button class="chip" @click="sendChip(chip)" x-text="lang === 'cy' ? chip.cy : chip.en"></button>
        </template>
      </div>
    </template>

  </div>

  <!-- ── Input area ── -->
  <div class="input-area">
    <div class="input-row">
      <input
        class="chat-input"
        id="chatInput"
        type="text"
        x-model="text"
        :placeholder="lang === 'cy' ? 'Gofynnwch unrhyw beth am PCYDDS...' : 'Ask me anything about UWTSD...'"
        @keydown.enter.prevent="send()"
        autocomplete="off"
        aria-label="Type your message"
      />
      <button class="send-btn" @click="send()" :disabled="busy || !text.trim()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="sub-footer">
      <a
        :href="googleFormsUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="forms-link"
        x-text="lang === 'cy' ? 'Agor ffurflen adborth lawn (Google Forms)' : 'Open full feedback form (Google Forms)'"
      ></a>
    </div>
  </div>

  <!-- ── Toast notifications ── -->
  <div class="toast-container" aria-live="polite" aria-atomic="true">
    <template x-for="(t, i) in toasts" :key="t.id">
      <div class="toast" :class="t.exit ? 'exit' : ''">
        <span class="toast-dot"></span>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

</div>

<!-- ── Feedback Modal ── -->
<div
  class="overlay"
  x-data
  x-show="$store.fb.open"
  x-transition:enter="overlay-enter"
  x-transition:leave="overlay-leave"
  @click.self="$store.fb.open = false"
  x-cloak
>
  <div class="modal" @click.stop>
    <div class="modal-head">
      <div>
        <div class="modal-title" x-text="$store.fb.lang === 'cy' ? 'Sut oedd eich profiad?' : 'How was your experience?'"></div>
        <div class="modal-sub" x-text="$store.fb.lang === 'cy' ? 'Mae eich adborth yn helpu gwella U-Pal ar gyfer holl fyfyrwyr PCYDDS.' : 'Your feedback helps improve U-Pal for all UWTSD students.'"></div>
      </div>
      <button class="modal-close" @click="$store.fb.open = false" aria-label="Close">&#x2715;</button>
    </div>

    <template x-if="!$store.fb.done">
      <div style="display:flex;flex-direction:column;gap:18px;">

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Boddhad cyffredinol' : 'Overall satisfaction'"></span>
          <div class="star-row" id="starRow" x-data="{ hovered: 0 }">
            <template x-for="n in [1,2,3,4,5]" :key="n">
              <button
                class="star"
                :class="(n <= $store.fb.stars || n <= hovered) ? 'on' : ''"
                @click="$store.fb.stars = n"
                @mouseenter="hovered = n"
                @mouseleave="hovered = 0"
                :aria-label="n + ' star'"
              >&#9733;</button>
            </template>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Oedd yr ateb yn ddefnyddiol?' : 'Was the answer helpful?'"></span>
          <div class="toggle-row">
            <button class="toggle-btn" :class="$store.fb.helpful === true ? 'on' : ''" @click="$store.fb.helpful = true" x-text="$store.fb.lang === 'cy' ? 'Oedd' : 'Yes'"></button>
            <button class="toggle-btn" :class="$store.fb.helpful === false ? 'on' : ''" @click="$store.fb.helpful = false" x-text="$store.fb.lang === 'cy' ? 'Nac oedd' : 'No'"></button>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Gawsoch chi ymateb yn yr iaith gywir?' : 'Did you get a response in the right language?'"></span>
          <div class="toggle-row">
            <button class="toggle-btn" :class="$store.fb.langOk === true ? 'on' : ''" @click="$store.fb.langOk = true" x-text="$store.fb.lang === 'cy' ? 'Do' : 'Yes'"></button>
            <button class="toggle-btn" :class="$store.fb.langOk === false ? 'on' : ''" @click="$store.fb.langOk = false" x-text="$store.fb.lang === 'cy' ? 'Naddo' : 'No'"></button>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Unrhyw sylwadau eraill? (dewisol)' : 'Any other comments? (optional)'"></span>
          <textarea class="fb-textarea" rows="3" maxlength="300" x-model="$store.fb.comments" :placeholder="$store.fb.lang === 'cy' ? 'Eich barn...' : 'Your thoughts...'"></textarea>
        </div>

        <button class="fb-submit" @click="$store.fb.submit()" :disabled="$store.fb.submitting" x-text="$store.fb.lang === 'cy' ? 'Cyflwyno adborth' : 'Submit feedback'"></button>
      </div>
    </template>

    <template x-if="$store.fb.done">
      <div class="fb-thanks" x-text="$store.fb.lang === 'cy' ? 'Diolch am eich adborth — mae\\'n help mawr.' : 'Thank you for your feedback — it really helps.'"></div>
    </template>
  </div>
</div>

<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('fb', {
      open: false, done: false, submitting: false,
      lang: 'en', stars: 0, helpful: null, langOk: null, comments: '',
      async submit() {
        if (!this.stars) {
          const row = document.getElementById('starRow');
          if (row) { row.classList.add('shake'); setTimeout(() => row.classList.remove('shake'), 300); }
          return;
        }
        this.submitting = true;
        try {
          await fetch('/api/feedback', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
              satisfaction:    this.stars,
              helpfulAnswer:   this.helpful,
              correctLanguage: this.langOk,
              comments:        this.comments
            })
          });
        } catch (_) {}
        this.done = true;
        this.submitting = false;
        // Fire a custom event so the main upal() component can show a toast
        window.dispatchEvent(new CustomEvent('upal:toast', {
          detail: { msg: this.lang === 'cy' ? 'Diolch am eich adborth!' : 'Thanks for your feedback!' }
        }));
        setTimeout(() => { this.open = false; }, 2000);
      }
    });
  });

  function upal() {
    return {
      msgs:           [],
      text:           '',
      busy:           false,
      lang:           'en',
      chipsDismissed: false,
      toasts:         [],
      _toastId:       0,
      googleFormsUrl: 'https://forms.gle/YOUR_GOOGLE_FORM_LINK',

      chips: [
        { en: 'How do I apply?',       cy: 'Sut i wneud cais?',
          queryEn: 'How do I apply for a course at UWTSD?',
          queryCy: 'Sut mae gwneud cais am gwrs yn PCYDDS?' },
        { en: 'Tuition fees',          cy: 'Ffioedd dysgu',
          queryEn: 'How much are the tuition fees at UWTSD?',
          queryCy: 'Faint yw ffioedd dysgu PCYDDS?' },
        { en: 'Student accommodation', cy: 'Llety myfyrwyr',
          queryEn: 'Where can I find student accommodation at UWTSD?',
          queryCy: 'Ble alla i ddod o hyd i lety myfyrwyr yn PCYDDS?' },
        { en: 'IT help',               cy: 'Cymorth TG',
          queryEn: 'I need help with IT, Moodle or the student portal',
          queryCy: 'Dwi angen help gyda TG, Mwdl neu borth y myfyrwyr' },
        { en: 'Wellbeing support',     cy: 'Cymorth lles',
          queryEn: 'I need wellbeing support and mental health help',
          queryCy: 'Dwi angen cymorth lles a help iechyd meddwl' },
        { en: 'Courses available',     cy: 'Cyrsiau sydd ar gael',
          queryEn: 'What courses and subjects are available at UWTSD?',
          queryCy: 'Pa gyrsiau a phynciau sydd ar gael yn PCYDDS?' },
        { en: 'Campus locations',      cy: 'Lleoliadau campws',
          queryEn: 'Where are the UWTSD campuses located?',
          queryCy: 'Ble mae campysau PCYDDS wedi eu lleoli?' },
        { en: 'Student loans',         cy: 'Benthyciadau myfyrwyr',
          queryEn: 'How do I apply for a student loan to fund my studies?',
          queryCy: 'Sut mae gwneud cais am fenthyciad myfyriwr i ariannu fy astudiaethau?' }
      ],

      init() {
        this.msgs.push({
          type: 'bot', msgLang: 'en',
          html: 'Hi there! I\'m <strong>U-Pal</strong>, your UWTSD student assistant. I can help with admissions, courses, fees, accommodation, IT support, wellbeing and more.<br><br>How can I help you today?',
          altHtml: null, _showAlt: false
        });
        // Listen for toast events fired from other Alpine stores (e.g. feedback)
        window.addEventListener('upal:toast', (e) => {
          this.showToast(e.detail.msg);
        });
      },

      // ── Toast system ────────────────────────────────────────────────
      showToast(msg, duration) {
        duration = duration || 2800;
        const id = ++this._toastId;
        this.toasts.push({ id, msg, exit: false });
        setTimeout(() => {
          const t = this.toasts.find(t => t.id === id);
          if (t) t.exit = true;
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 320);
        }, duration);
      },

      linkify(t) {
        return t.replace(
          /(https?:\/\/[^\s]+|[a-zA-Z0-9\-]+\.(ac\.uk|co\.uk|com|org|gov\.uk)[^\s<]*)/g,
          u => {
            const h = u.startsWith('http') ? u : 'https://' + u;
            return '<a href="' + h + '" target="_blank" rel="noopener noreferrer">' + u + '</a>';
          }
        );
      },

      htmlify(t) {
        if (!t) return '';
        const esc = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return this.linkify(esc).replace(/\n/g, '<br>');
      },

      async sendChip(chip) {
        this.chipsDismissed = true;
        // Display the short label in the chat bubble but send the full
        // query so TF-IDF can match the right intent
        const displayText = this.lang === 'cy' ? chip.cy : chip.en;
        const queryText   = this.lang === 'cy'
          ? (chip.queryCy || chip.cy)
          : (chip.queryEn || chip.en);
        // Push the display label as the user message
        this.msgs.push({ type: 'user', text: displayText });
        this.msgs.push({ type: 'typing' });
        this.$nextTick(() => this.scrollDown());
        // But dispatch the full query to the backend
        await this.dispatchQuery(queryText);
      },

      async send() {
        const t = this.text.trim();
        if (!t || this.busy) return;
        this.text = '';
        this.chipsDismissed = true;
        await this.dispatch(t);
      },

      async dispatch(userText) {
        this.busy = true;

        // Build conversation history from prior turns (before we push this new one).
        const history = this.msgs
          .filter(m => m.type === 'user' || m.type === 'bot')
          .slice(-6)
          .map(m => ({
            role: m.type === 'user' ? 'user' : 'assistant',
            text: (m.text || m.html || '').replace(/<[^>]+>/g, '').trim()
          }))
          .filter(t => t.text.length > 0);

        this.msgs.push({ type: 'user', text: userText });
        this.msgs.push({ type: 'typing' });
        this.$nextTick(() => this.scrollDown());
        await this.dispatchQuery(userText, history);
      },

      // Send a query to the backend without pushing a user bubble.
      // Used by sendChip so it can show a short label but send a full query.
      async dispatchQuery(queryText, history) {
        if (!history) {
          history = this.msgs
            .filter(m => m.type === 'user' || m.type === 'bot')
            .slice(-6)
            .map(m => ({
              role: m.type === 'user' ? 'user' : 'assistant',
              text: (m.text || m.html || '').replace(/<[^>]+>/g, '').trim()
            }))
            .filter(t => t.text.length > 0);
        }
        this.busy = true;
        try {
          const [data] = await Promise.all([
            fetch('/api/chat', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({
                message: queryText,
                runningLang: this.lang,
                history: history
              })
            }).then(r => r.json()),
            new Promise(r => setTimeout(r, 650))
          ]);

          this.msgs = this.msgs.filter(m => m.type !== 'typing');

          if (data.error) {
            this.msgs.push({ type: 'bot', msgLang: this.lang,
              html: this.lang === 'cy' ? "Sori, aeth rhywbeth o'i le. Rhowch gynnig arall arni." : "Sorry, something went wrong. Please try again.",
              altHtml: null, _showAlt: false });
            return;
          }

          if (data.lang && data.lang !== this.lang) {
            this.lang = data.lang;
            document.documentElement.lang = this.lang;
            Alpine.store('fb').lang = this.lang;
            this.showToast(
              data.lang === 'cy'
                ? 'Cymraeg wedi ei ganfod'
                : 'Switched to English',
              2400
            );
          }

          this.msgs.push({
            type:     'bot',
            msgLang:  data.lang || this.lang,
            html:     this.htmlify(data.response || ''),
            altHtml:  data.altResponse ? this.htmlify(data.altResponse) : null,
            _showAlt: false
          });

        } catch (e) {
          this.msgs = this.msgs.filter(m => m.type !== 'typing');
          this.msgs.push({ type: 'bot', msgLang: this.lang,
            html: this.lang === 'cy' ? "Sori, aeth rhywbeth o'i le. Rhowch gynnig arall arni." : "Sorry, something went wrong. Please try again.",
            altHtml: null, _showAlt: false });
          console.error(e);
        } finally {
          this.busy = false;
          this.$nextTick(() => this.scrollDown());
          document.getElementById('chatInput').focus();
        }
      },

      scrollDown() {
        const el = document.getElementById('msgList');
        if (el) el.scrollTop = el.scrollHeight;
      },

      openFeedback() {
        const s = Alpine.store('fb');
        s.lang = this.lang; s.done = false; s.submitting = false;
        s.stars = 0; s.helpful = null; s.langOk = null; s.comments = '';
        s.open = true;
      },

    };
  }
</script>
</body>
</html>

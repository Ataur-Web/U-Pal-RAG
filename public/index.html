<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Pal — UWTSD Student Assistant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       U-Pal · visual language
       A bilingual (Welsh / English) student-services chatbot for
       the University of Wales Trinity Saint David.
       ============================================================ */

    :root {
      /* Neutrals — warm off-white paper, deep ink */
      --paper:       #F9F6EF;
      --surface:     #FFFFFF;
      --surface-2:   #F3EFE6;
      --surface-3:   #E9E4D6;
      --ink:         #1A1A1D;
      --ink-2:       #4F4F54;
      --ink-3:       #8B8B91;
      --line:        rgba(0, 0, 0, 0.08);
      --line-md:     rgba(0, 0, 0, 0.15);

      /* Palette — UWTSD green anchor, Welsh crimson accent */
      --green:       #0E6B4C;
      --green-light: #DCEBE3;
      --green-mid:   #8DB5A3;
      --green-dark:  #0A4A34;
      --teal:        #0E6B4C;

      --welsh-red:   #B5322A;
      --welsh-red-soft: #F6E6E4;

      /* Shape */
      --radius:      16px;
      --radius-sm:   10px;
      --radius-lg:   22px;

      /* Shadow — soft, gentle, never harsh */
      --shadow-sm:   0 1px 2px rgba(26, 26, 29, 0.04);
      --shadow:      0 1px 3px rgba(26, 26, 29, 0.06),
                     0 10px 30px -14px rgba(26, 26, 29, 0.14);
      --shadow-lg:   0 4px 14px rgba(26, 26, 29, 0.08),
                     0 28px 60px -20px rgba(26, 26, 29, 0.2);

      /* Typography */
      --serif:       'Fraunces', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif;
      --sans:        'Inter', 'Nunito', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono:        'JetBrains Mono', 'DM Mono', ui-monospace, Menlo, monospace;

      /* Motion — spring physics inspired (Emil Kowalski principles)
         Spring: high initial velocity, natural deceleration, slight overshoot */
      --spring:      cubic-bezier(0.34, 1.56, 0.64, 1);   /* bouncy spring */
      --spring-sm:   cubic-bezier(0.22, 1.2,  0.36, 1);   /* gentle spring */
      --ease:        cubic-bezier(0.16, 1,    0.3,  1);   /* fast out */
      --ease-out:    cubic-bezier(0.22, 1,    0.36, 1);   /* smooth out */
      --ease-in:     cubic-bezier(0.4,  0,    1,    1);   /* fast in */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --paper:       #17181C;
        --surface:     #1E1F24;
        --surface-2:   #24252B;
        --surface-3:   #2C2D33;
        --ink:         #EFEDE4;
        --ink-2:       #B5B3AC;
        --ink-3:       #7E7C76;
        --line:        rgba(255, 255, 255, 0.09);
        --line-md:     rgba(255, 255, 255, 0.15);
        --green:       #3DAA80;
        --green-light: #1C2F28;
        --green-dark:  #9FD6BE;
        --welsh-red:   #E87369;
        --welsh-red-soft: #2A1E1D;
        --shadow-sm:   0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow:      0 1px 3px rgba(0, 0, 0, 0.4),
                       0 10px 30px -14px rgba(0, 0, 0, 0.6);
        --shadow-lg:   0 4px 14px rgba(0, 0, 0, 0.4),
                       0 28px 60px -20px rgba(0, 0, 0, 0.7);
      }
    }

    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('https://rsms.me/inter/font-files/InterVariable.woff2?v=4.0') format('woff2');
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    a { color: var(--green); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 160ms var(--ease); }
    a:hover { border-bottom-color: currentColor; }

    button { font-family: inherit; cursor: pointer; }
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

    /* ── Shell ── */
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      position: relative;
    }
    @media (max-width: 760px) {
      .shell { border-left: none; border-right: none; }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: saturate(140%) blur(8px);
      -webkit-backdrop-filter: saturate(140%) blur(8px);
    }

    .header-brand { display: flex; align-items: center; gap: 14px; }

    .brand-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm), inset 0 -1px 1px rgba(0,0,0,0.12);
    }

    .brand-text { display: flex; flex-direction: column; gap: 2px; line-height: 1.15; }

    .brand-name {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.025em;
    }

    .brand-sub {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.005em;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 22%, transparent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 22%, transparent); }
      50%      { box-shadow: 0 0 0 6px color-mix(in srgb, var(--green) 10%, transparent); }
    }

    .header-actions { display: flex; align-items: center; gap: 14px; }

    .feedback-btn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 8px 14px;
      border-radius: 999px;
      transition: all 180ms var(--ease);
    }
    .feedback-btn:hover {
      color: var(--ink);
      background: var(--surface-3);
      transform: translateY(-1px);
    }

    .lang-indicator {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--ink-3);
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      white-space: nowrap;
      user-select: none;
    }
    .lang-indicator .lit { color: var(--ink); font-weight: 700; }
    .lang-indicator .dim { color: var(--ink-3); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      padding: 28px 24px 20px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 10px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--line-md);
      border-radius: 999px;
      border: 3px solid var(--surface);
    }

    .row { display: flex; gap: 10px; align-items: flex-end; animation: msgEnter 420ms var(--spring) both; }
    .row.user { justify-content: flex-end; }
    .row.bot  { justify-content: flex-start; }

    @keyframes msgEnter {
      0%   { opacity: 0; transform: translateY(12px) scale(0.97); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bot-col { display: flex; flex-direction: column; gap: 6px; max-width: calc(100% - 46px); }

    .bubble {
      max-width: 100%;
      padding: 12px 17px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 15.5px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      border-bottom-right-radius: 5px;
      max-width: 78%;
      box-shadow: var(--shadow-sm), inset 0 -1px 1px rgba(0,0,0,0.12);
    }
    .bubble.bot {
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--line);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
    }
    .bubble.bot a { color: var(--green); font-weight: 500; }

    .cy-chip {
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--welsh-red);
      background: var(--welsh-red-soft);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .translate-btn {
      align-self: flex-start;
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
      background: transparent;
      border: 1px solid var(--line-md);
      padding: 6px 12px;
      border-radius: 999px;
      transition: all 160ms var(--ease);
    }
    .translate-btn:hover {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-light);
    }

    .lang-notice {
      align-self: center;
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--welsh-red);
      background: var(--welsh-red-soft);
      padding: 7px 14px;
      border-radius: 999px;
      margin: 6px auto;
      animation: fadeUp 320ms var(--ease) both;
    }

    .typing-bubble {
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 14px 18px;
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: var(--shadow-sm);
      animation: msgEnter 380ms var(--spring) both;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.5;
      animation: typingPop 1.2s infinite var(--spring);
    }
    .typing-bubble span:nth-child(1) { animation-delay: 0s; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingPop {
      0%, 60%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      30%           { transform: translateY(-6px) scale(1.15); opacity: 1; }
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 24px 8px;
    }
    .chip {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-2);
      background: var(--surface);
      border: 1px solid var(--line-md);
      padding: 8px 14px;
      border-radius: 999px;
      transition: all 200ms var(--spring);
      animation: chipPop 500ms var(--spring) both;
    }
    /* Stagger each chip using nth-child */
    .chip:nth-child(1) { animation-delay: 60ms; }
    .chip:nth-child(2) { animation-delay: 100ms; }
    .chip:nth-child(3) { animation-delay: 140ms; }
    .chip:nth-child(4) { animation-delay: 180ms; }
    .chip:nth-child(5) { animation-delay: 220ms; }
    .chip:nth-child(6) { animation-delay: 260ms; }
    .chip:nth-child(7) { animation-delay: 300ms; }
    .chip:nth-child(8) { animation-delay: 340ms; }
    @keyframes chipPop {
      0%   { opacity: 0; transform: translateY(8px) scale(0.92); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .chip:hover {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-light);
      transform: translateY(-2px) scale(1.03);
      box-shadow: var(--shadow-sm);
    }
    .chip:active {
      transform: translateY(0) scale(0.97);
      transition-duration: 80ms;
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--line);
      background: var(--surface);
      padding: 14px 24px 18px;
      position: sticky;
      bottom: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      resize: none;
      min-height: 50px;
      max-height: 180px;
      padding: 13px 17px;
      border-radius: var(--radius);
      border: 1px solid var(--line-md);
      background: var(--surface-2);
      font-family: var(--sans);
      font-size: 15.5px;
      line-height: 1.5;
      color: var(--ink);
      transition: border-color 160ms var(--ease), box-shadow 160ms var(--ease);
    }
    .chat-input::placeholder { color: var(--ink-3); }
    .chat-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 18%, transparent);
      outline: none;
      background: var(--surface);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      padding: 0;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 160ms var(--ease);
      box-shadow: var(--shadow-sm), inset 0 -1px 1px rgba(0,0,0,0.12);
      cursor: pointer;
    }
    .send-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--green-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .send-btn:active:not(:disabled) { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .sub-footer {
      font-family: var(--sans);
      font-size: 11.5px;
      color: var(--ink-3);
      text-align: center;
      padding: 10px 24px 0;
      line-height: 1.5;
    }
    .sub-footer strong { color: var(--ink-2); font-weight: 600; }

    /* ── Feedback modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 20, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      animation: overlayIn 250ms var(--ease) both;
    }
    @keyframes overlayIn {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to   { opacity: 1; backdrop-filter: blur(6px); }
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 440px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 400ms var(--spring) both;
      border: 1px solid var(--line);
    }
    @keyframes modalIn {
      0%   { opacity: 0; transform: translateY(24px) scale(0.94); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-head {
      padding: 24px 28px 14px;
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .modal-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .modal-sub {
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--ink-2);
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 22px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--ink-2);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 160ms var(--ease);
    }
    .modal-close:hover { background: var(--surface-3); color: var(--ink); }

    .fb-section {
      padding: 18px 28px;
      border-bottom: 1px solid var(--line);
    }
    .fb-section:last-of-type { border-bottom: none; }

    .fb-label {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 10px;
      display: block;
      letter-spacing: 0.01em;
    }

    .star-row { display: flex; gap: 4px; }
    .star {
      width: 40px; height: 40px;
      border: none;
      background: transparent;
      font-size: 28px;
      color: var(--ink-3);
      cursor: pointer;
      transition: all 150ms var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .star:hover { transform: scale(1.2); }
    .star.on { color: var(--green); filter: drop-shadow(0 0 4px color-mix(in srgb, var(--green) 40%, transparent)); }

    .toggle-row { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid var(--line-md);
      background: var(--surface);
      border-radius: var(--radius-sm);
      color: var(--ink-2);
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      transition: all 160ms var(--ease);
    }
    .toggle-btn:hover { border-color: var(--green); color: var(--green); }
    .toggle-btn.on {
      background: var(--green-light);
      color: var(--green-dark);
      border-color: var(--green);
      font-weight: 600;
    }

    .fb-textarea {
      width: 100%;
      resize: vertical;
      min-height: 80px;
      padding: 11px 14px;
      border: 1px solid var(--line-md);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      font-family: var(--sans);
      font-size: 14px;
      color: var(--ink);
      line-height: 1.5;
      transition: border-color 160ms var(--ease);
    }
    .fb-textarea:focus {
      border-color: var(--green);
      outline: none;
      background: var(--surface);
    }

    .fb-submit {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 14.5px;
      font-weight: 600;
      transition: all 160ms var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .fb-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow); }
    .fb-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .fb-thanks {
      text-align: center;
      padding: 24px 28px;
      font-family: var(--serif);
      font-size: 17px;
      color: var(--green-dark);
    }

    .forms-link {
      display: block;
      text-align: center;
      padding: 12px 28px 20px;
      font-size: 12.5px;
      color: var(--ink-3);
    }
    .forms-link:hover { color: var(--green); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s var(--ease); }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--surface);
      background: var(--ink);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow-lg);
      white-space: nowrap;
      pointer-events: auto;
      animation: toastIn 400ms var(--spring) both;
    }
    .toast.exit {
      animation: toastOut 300ms var(--ease-in) both;
    }
    .toast-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    @keyframes toastIn {
      0%   { opacity: 0; transform: translateY(-16px) scale(0.88); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.92); }
    }

    /* ── Lang notice (inline in chat) ── */
    .lang-notice {
      align-self: center;
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--welsh-red);
      background: var(--welsh-red-soft);
      padding: 7px 14px;
      border-radius: 999px;
      margin: 6px auto;
      animation: msgEnter 320ms var(--spring) both;
    }

    [x-cloak] { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="shell" x-data="upal()">

  <!-- ── Header ── -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-avatar">U</div>
      <div class="brand-text">
        <span class="brand-name">U-Pal</span>
        <span class="brand-sub">
          <span class="online-dot"></span>
          <span x-text="lang === 'cy' ? 'Cynorthwyydd Myfyrwyr PCYDDS' : 'UWTSD Student Assistant'"></span>
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button class="feedback-btn" @click="openFeedback()" x-text="lang === 'cy' ? 'Adborth' : 'Rate U-Pal'"></button>
      <div class="lang-indicator" :title="lang === 'cy' ? 'Cymraeg detected' : 'English detected'">
        <span :class="lang === 'cy' ? 'lit' : 'dim'">CY</span>
        <span style="color:var(--ink-3)"> · </span>
        <span :class="lang === 'en' ? 'lit' : 'dim'">EN</span>
      </div>
    </div>
  </div>

  <!-- ── Messages ── -->
  <div class="messages" id="msgList" role="log" aria-live="polite">

    <template x-for="(m, i) in msgs" :key="i">
      <div>

        <!-- lang notice -->
        <template x-if="m.type === 'notice'">
          <div class="lang-notice" x-text="m.text"></div>
        </template>

        <!-- user message -->
        <template x-if="m.type === 'user'">
          <div class="row user">
            <div class="bubble user" x-text="m.text"></div>
          </div>
        </template>

        <!-- bot message -->
        <template x-if="m.type === 'bot'">
          <div class="row bot">
            <div class="msg-avatar">U</div>
            <div class="bot-col">
              <template x-if="m.msgLang === 'cy'">
                <span class="cy-chip">Cymraeg</span>
              </template>
              <div class="bubble bot" x-html="m._showAlt ? m.altHtml : m.html"></div>
              <template x-if="m.altHtml">
                <button
                  class="translate-btn"
                  @click="m._showAlt = !m._showAlt"
                  x-text="m._showAlt
                    ? (m.msgLang === 'cy' ? 'Nôl i Gymraeg' : 'Back to English')
                    : (m.msgLang === 'cy' ? 'Cyfieithwch i Saesneg' : 'Translate to Welsh')"
                ></button>
              </template>
            </div>
          </div>
        </template>

        <!-- typing -->
        <template x-if="m.type === 'typing'">
          <div class="row bot">
            <div class="msg-avatar">U</div>
            <div class="typing-bubble">
              <span></span><span></span><span></span>
            </div>
          </div>
        </template>

      </div>
    </template>

    <!-- Quick chips -->
    <template x-if="!chipsDismissed">
      <div class="chips">
        <template x-for="chip in chips" :key="chip.en">
          <button class="chip" @click="sendChip(chip)" x-text="lang === 'cy' ? chip.cy : chip.en"></button>
        </template>
      </div>
    </template>

  </div>

  <!-- ── Input area ── -->
  <div class="input-area">
    <div class="input-row">
      <input
        class="chat-input"
        id="chatInput"
        type="text"
        x-model="text"
        :placeholder="lang === 'cy' ? 'Gofynnwch unrhyw beth am PCYDDS...' : 'Ask me anything about UWTSD...'"
        @keydown.enter.prevent="send()"
        autocomplete="off"
        aria-label="Type your message"
      />
      <button class="send-btn" @click="send()" :disabled="busy || !text.trim()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="sub-footer">
      <a
        :href="googleFormsUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="forms-link"
        x-text="lang === 'cy' ? 'Agor ffurflen adborth lawn (Google Forms)' : 'Open full feedback form (Google Forms)'"
      ></a>
    </div>
  </div>

  <!-- ── Toast notifications ── -->
  <div class="toast-container" aria-live="polite" aria-atomic="true">
    <template x-for="(t, i) in toasts" :key="t.id">
      <div class="toast" :class="t.exit ? 'exit' : ''">
        <span class="toast-dot"></span>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

</div>

<!-- ── Feedback Modal ── -->
<div
  class="overlay"
  x-data
  x-show="$store.fb.open"
  @click.self="$store.fb.open = false"
  x-cloak
>
  <div class="modal" @click.stop>
    <div class="modal-head">
      <div>
        <div class="modal-title" x-text="$store.fb.lang === 'cy' ? 'Sut oedd eich profiad?' : 'How was your experience?'"></div>
        <div class="modal-sub" x-text="$store.fb.lang === 'cy' ? 'Mae eich adborth yn helpu gwella U-Pal ar gyfer holl fyfyrwyr PCYDDS.' : 'Your feedback helps improve U-Pal for all UWTSD students.'"></div>
      </div>
      <button class="modal-close" @click="$store.fb.open = false" aria-label="Close">&#x2715;</button>
    </div>

    <template x-if="!$store.fb.done">
      <div style="display:flex;flex-direction:column;gap:18px;">

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Boddhad cyffredinol' : 'Overall satisfaction'"></span>
          <div class="star-row" id="starRow" x-data="{ hovered: 0 }">
            <template x-for="n in [1,2,3,4,5]" :key="n">
              <button
                class="star"
                :class="(n <= $store.fb.stars || n <= hovered) ? 'on' : ''"
                @click="$store.fb.stars = n"
                @mouseenter="hovered = n"
                @mouseleave="hovered = 0"
                :aria-label="n + ' star'"
              >&#9733;</button>
            </template>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Oedd yr ateb yn ddefnyddiol?' : 'Was the answer helpful?'"></span>
          <div class="toggle-row">
            <button class="toggle-btn" :class="$store.fb.helpful === true ? 'on' : ''" @click="$store.fb.helpful = true" x-text="$store.fb.lang === 'cy' ? 'Oedd' : 'Yes'"></button>
            <button class="toggle-btn" :class="$store.fb.helpful === false ? 'on' : ''" @click="$store.fb.helpful = false" x-text="$store.fb.lang === 'cy' ? 'Nac oedd' : 'No'"></button>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Gawsoch chi ymateb yn yr iaith gywir?' : 'Did you get a response in the right language?'"></span>
          <div class="toggle-row">
            <button class="toggle-btn" :class="$store.fb.langOk === true ? 'on' : ''" @click="$store.fb.langOk = true" x-text="$store.fb.lang === 'cy' ? 'Do' : 'Yes'"></button>
            <button class="toggle-btn" :class="$store.fb.langOk === false ? 'on' : ''" @click="$store.fb.langOk = false" x-text="$store.fb.lang === 'cy' ? 'Naddo' : 'No'"></button>
          </div>
        </div>

        <div class="fb-section">
          <span class="fb-label" x-text="$store.fb.lang === 'cy' ? 'Unrhyw sylwadau eraill? (dewisol)' : 'Any other comments? (optional)'"></span>
          <textarea class="fb-textarea" rows="3" maxlength="300" x-model="$store.fb.comments" :placeholder="$store.fb.lang === 'cy' ? 'Eich barn...' : 'Your thoughts...'"></textarea>
        </div>

        <button class="fb-submit" @click="$store.fb.submit()" :disabled="$store.fb.submitting" x-text="$store.fb.lang === 'cy' ? 'Cyflwyno adborth' : 'Submit feedback'"></button>
      </div>
    </template>

    <template x-if="$store.fb.done">
      <div class="fb-thanks" x-text="$store.fb.lang === 'cy' ? 'Diolch am eich adborth — mae\\'n help mawr.' : 'Thank you for your feedback — it really helps.'"></div>
    </template>
  </div>
</div>

<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('fb', {
      open: false, done: false, submitting: false,
      lang: 'en', stars: 0, helpful: null, langOk: null, comments: '',
      async submit() {
        if (!this.stars) {
          const row = document.getElementById('starRow');
          if (row) { row.classList.add('shake'); setTimeout(() => row.classList.remove('shake'), 300); }
          return;
        }
        this.submitting = true;
        try {
          await fetch('/api/feedback', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
              satisfaction:    this.stars,
              helpfulAnswer:   this.helpful,
              correctLanguage: this.langOk,
              comments:        this.comments
            })
          });
        } catch (_) {}
        this.done = true;
        this.submitting = false;
        // Fire a custom event so the main upal() component can show a toast
        window.dispatchEvent(new CustomEvent('upal:toast', {
          detail: { msg: this.lang === 'cy' ? '✓ Diolch am eich adborth!' : '✓ Thanks for your feedback!' }
        }));
        setTimeout(() => { this.open = false; }, 2000);
      }
    });
  });

  function upal() {
    return {
      msgs:           [],
      text:           '',
      busy:           false,
      lang:           'en',
      chipsDismissed: false,
      toasts:         [],
      _toastId:       0,
      googleFormsUrl: 'https://forms.gle/YOUR_GOOGLE_FORM_LINK',

      chips: [
        { en: 'How do I apply?',       cy: 'Sut i wneud cais?',
          queryEn: 'How do I apply for a course at UWTSD?',
          queryCy: 'Sut mae gwneud cais am gwrs yn PCYDDS?' },
        { en: 'Tuition fees',          cy: 'Ffioedd dysgu',
          queryEn: 'How much are the tuition fees at UWTSD?',
          queryCy: 'Faint yw ffioedd dysgu PCYDDS?' },
        { en: 'Student accommodation', cy: 'Llety myfyrwyr',
          queryEn: 'Where can I find student accommodation at UWTSD?',
          queryCy: 'Ble alla i ddod o hyd i lety myfyrwyr yn PCYDDS?' },
        { en: 'IT help',               cy: 'Cymorth TG',
          queryEn: 'I need help with IT, Moodle or the student portal',
          queryCy: 'Dwi angen help gyda TG, Mwdl neu borth y myfyrwyr' },
        { en: 'Wellbeing support',     cy: 'Cymorth lles',
          queryEn: 'I need wellbeing support and mental health help',
          queryCy: 'Dwi angen cymorth lles a help iechyd meddwl' },
        { en: 'Courses available',     cy: 'Cyrsiau sydd ar gael',
          queryEn: 'What courses and subjects are available at UWTSD?',
          queryCy: 'Pa gyrsiau a phynciau sydd ar gael yn PCYDDS?' },
        { en: 'Campus locations',      cy: 'Lleoliadau campws',
          queryEn: 'Where are the UWTSD campuses located?',
          queryCy: 'Ble mae campysau PCYDDS wedi eu lleoli?' },
        { en: 'Student loans',         cy: 'Benthyciadau myfyrwyr',
          queryEn: 'How do I apply for a student loan to fund my studies?',
          queryCy: 'Sut mae gwneud cais am fenthyciad myfyriwr i ariannu fy astudiaethau?' }
      ],

      init() {
        this.msgs.push({
          type: 'bot', msgLang: 'en',
          html: 'Hi there! I\'m <strong>U-Pal</strong>, your UWTSD student assistant. I can help with admissions, courses, fees, accommodation, IT support, wellbeing and more.<br><br>How can I help you today?',
          altHtml: null, _showAlt: false
        });
        // Listen for toast events fired from other Alpine stores (e.g. feedback)
        window.addEventListener('upal:toast', (e) => {
          this.showToast(e.detail.msg);
        });
      },

      // ── Toast system ────────────────────────────────────────────────
      showToast(msg, duration) {
        duration = duration || 2800;
        const id = ++this._toastId;
        this.toasts.push({ id, msg, exit: false });
        setTimeout(() => {
          const t = this.toasts.find(t => t.id === id);
          if (t) t.exit = true;
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 320);
        }, duration);
      },

      linkify(t) {
        return t.replace(
          /(https?:\/\/[^\s]+|[a-zA-Z0-9\-]+\.(ac\.uk|co\.uk|com|org|gov\.uk)[^\s<]*)/g,
          u => {
            const h = u.startsWith('http') ? u : 'https://' + u;
            return '<a href="' + h + '" target="_blank" rel="noopener noreferrer">' + u + '</a>';
          }
        );
      },

      htmlify(t) {
        if (!t) return '';
        const esc = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return this.linkify(esc).replace(/\n/g, '<br>');
      },

      async sendChip(chip) {
        this.chipsDismissed = true;
        // Display the short label in the chat bubble but send the full
        // query so TF-IDF can match the right intent
        const displayText = this.lang === 'cy' ? chip.cy : chip.en;
        const queryText   = this.lang === 'cy'
          ? (chip.queryCy || chip.cy)
          : (chip.queryEn || chip.en);
        // Push the display label as the user message
        this.msgs.push({ type: 'user', text: displayText });
        this.msgs.push({ type: 'typing' });
        this.$nextTick(() => this.scrollDown());
        // But dispatch the full query to the backend
        await this.dispatchQuery(queryText);
      },

      async send() {
        const t = this.text.trim();
        if (!t || this.busy) return;
        this.text = '';
        this.chipsDismissed = true;
        await this.dispatch(t);
      },

      async dispatch(userText) {
        this.busy = true;

        // Build conversation history from prior turns (before we push this new one).
        const history = this.msgs
          .filter(m => m.type === 'user' || m.type === 'bot')
          .slice(-6)
          .map(m => ({
            role: m.type === 'user' ? 'user' : 'assistant',
            text: (m.text || m.html || '').replace(/<[^>]+>/g, '').trim()
          }))
          .filter(t => t.text.length > 0);

        this.msgs.push({ type: 'user', text: userText });
        this.msgs.push({ type: 'typing' });
        this.$nextTick(() => this.scrollDown());
        await this.dispatchQuery(userText, history);
      },

      // Send a query to the backend without pushing a user bubble.
      // Used by sendChip so it can show a short label but send a full query.
      async dispatchQuery(queryText, history) {
        if (!history) {
          history = this.msgs
            .filter(m => m.type === 'user' || m.type === 'bot')
            .slice(-6)
            .map(m => ({
              role: m.type === 'user' ? 'user' : 'assistant',
              text: (m.text || m.html || '').replace(/<[^>]+>/g, '').trim()
            }))
            .filter(t => t.text.length > 0);
        }
        this.busy = true;
        try {
          const [data] = await Promise.all([
            fetch('/api/chat', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({
                message: queryText,
                runningLang: this.lang,
                history: history
              })
            }).then(r => r.json()),
            new Promise(r => setTimeout(r, 650))
          ]);

          this.msgs = this.msgs.filter(m => m.type !== 'typing');

          if (data.error) {
            this.msgs.push({ type: 'bot', msgLang: this.lang,
              html: this.lang === 'cy' ? "Sori, aeth rhywbeth o'i le. Rhowch gynnig arall arni." : "Sorry, something went wrong. Please try again.",
              altHtml: null, _showAlt: false });
            return;
          }

          if (data.lang && data.lang !== this.lang) {
            this.lang = data.lang;
            document.documentElement.lang = this.lang;
            Alpine.store('fb').lang = this.lang;
            this.showToast(
              data.lang === 'cy'
                ? '🏴󠁧󠁢󠁷󠁬󠁳󠁿 Cymraeg wedi ei ganfod'
                : '🇬🇧 Switched to English',
              2400
            );
          }

          this.msgs.push({
            type:     'bot',
            msgLang:  data.lang || this.lang,
            html:     this.htmlify(data.response || ''),
            altHtml:  data.altResponse ? this.htmlify(data.altResponse) : null,
            _showAlt: false
          });

        } catch (e) {
          this.msgs = this.msgs.filter(m => m.type !== 'typing');
          this.msgs.push({ type: 'bot', msgLang: this.lang,
            html: this.lang === 'cy' ? "Sori, aeth rhywbeth o'i le. Rhowch gynnig arall arni." : "Sorry, something went wrong. Please try again.",
            altHtml: null, _showAlt: false });
          console.error(e);
        } finally {
          this.busy = false;
          this.$nextTick(() => this.scrollDown());
          document.getElementById('chatInput').focus();
        }
      },

      scrollDown() {
        const el = document.getElementById('msgList');
        if (el) el.scrollTop = el.scrollHeight;
      },

      openFeedback() {
        const s = Alpine.store('fb');
        s.lang = this.lang; s.done = false; s.submitting = false;
        s.stars = 0; s.helpful = null; s.langOk = null; s.comments = '';
        s.open = true;
      },

    };
  }
</script>
</body>
</html>
